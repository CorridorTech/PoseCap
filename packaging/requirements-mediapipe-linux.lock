# Linux CPU runtime for the isolated MediaPipe Lite backend.
#
# Import-compatibility validated on Linux (2026-07-18): `uv pip install
# mediapipe==0.10.35 opencv-contrib-python==5.0.0.93` on a Linux x86_64
# machine resolves to a dependency closure byte-for-byte identical to
# requirements-mediapipe.lock (the Windows runtime), including transitive
# pins. That is NOT the same as ADR-0008's frozen 13-fixture accuracy and
# continuity gate, which this file has not yet been run through on Linux --
# doing so needs real camera hardware. Keep every resolved package pinned;
# changing this file requires rerunning that gate on Linux.
