version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Sao_Paulo
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    groups:
      python-dependencies:
        patterns: ["*"]
    commit-message:
      prefix: build(deps)
    labels: [dependencies, python]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: America/Sao_Paulo
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: ci(deps)
    labels: [dependencies, github-actions]
