name: Linux PEAR wheel

# Builds the PyTorch3D wheel that the Linux PEAR payload ships (task 0042).
#
# Why this exists: on Windows the end user never compiles PyTorch3D --
# tools/install/setup_pear_runtime.ps1 builds it once on the release runner and
# packaging/build_pear_payload.ps1 repacks the result into the payload. Linux had
# no equivalent, so the community Linux installer (#98) was left compiling on the
# end user's machine, where it hits three independent version walls: a CUDA
# toolkit whose major.minor must match the torch wheels, nvcc's GCC-14 host
# compiler cap, and newer glibc math headers colliding with CUDA 12.8's own.
# Compiling once, here, in an environment we pin, removes all three.
#
# Manual only. A full build is long and must not run on every pull request.

on:
  workflow_dispatch:
    inputs:
      pytorch3d_ref:
        description: "PyTorch3D git tag to build (ADR-0016 pins v0.7.9)"
        required: false
        default: "v0.7.9"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # ADR-0016's runtime matrix. TORCH_ARCH_LIST mirrors the architectures the
  # Windows payload already carries, so one wheel serves every supported GPU
  # from Volta through Blackwell.
  TORCH_VERSION: "2.9.1+cu128"
  TORCH_INDEX_URL: "https://download.pytorch.org/whl/cu128"
  TORCH_ARCH_LIST: "7.0;7.5;8.0;8.6;9.0;10.0;12.0"
  CUDA_SUFFIX: "12-8"
  CUDA_HOME_DIR: "/usr/local/cuda-12.8"

jobs:
  wheel:
    name: Build PyTorch3D (manylinux_2_28, cu128)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    # Pinned by digest, matching how this repository pins its actions.
    # manylinux_2_28 is chosen deliberately: torch 2.9.1+cu128 ships as
    # manylinux_2_28_x86_64, so building here keeps our wheel's glibc floor
    # identical to torch's. Building on a newer base (ubuntu-24.04, glibc 2.39)
    # would make OUR wheel the limiting factor and lock out distributions whose
    # torch installs perfectly well.
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64@sha256:a61875a2f84cab7df8de222ff12cabc08ff86eb4ad402ac90ba7bdaed9600cca

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install the pinned CUDA toolchain
        run: |
          set -euxo pipefail
          dnf -y install dnf-plugins-core
          dnf config-manager --add-repo \
            https://developer.download.nvidia.com/compute/cuda/repos/rhel8/x86_64/cuda-rhel8.repo
          # NVIDIA's repository is rolling: the current cccl package declares
          # that it OBSOLETES cuda-cccl-12-8, so dnf refuses to install the 12.8
          # component we ask for by name and the whole transaction fails. Turning
          # obsolete processing off is what keeps this build pinned to the
          # ADR-0016 toolkit instead of drifting to whatever CUDA is newest --
          # which is the entire reason this job exists.
          dnf -y install --setopt=obsoletes=0 \
            "cuda-nvcc-${CUDA_SUFFIX}" \
            "cuda-cudart-devel-${CUDA_SUFFIX}" \
            "cuda-cccl-${CUDA_SUFFIX}" \
            "libcublas-devel-${CUDA_SUFFIX}" \
            "libcurand-devel-${CUDA_SUFFIX}"
          # Fail loudly if the pin silently drifted to another toolkit.
          "${CUDA_HOME_DIR}/bin/nvcc" --version | grep -q "release 12.8"
          "${CUDA_HOME_DIR}/bin/nvcc" --version
          # The host compiler must sit inside nvcc's supported range; this base
          # image ships one that does, and we record it rather than assume it.
          gcc --version

      - name: Install the pinned torch
        run: |
          set -euxo pipefail
          PY=/opt/python/cp311-cp311/bin/python
          "$PY" -m pip install --upgrade pip setuptools wheel
          "$PY" -m pip install "torch==${TORCH_VERSION}" --index-url "${TORCH_INDEX_URL}"
          "$PY" -c "import torch; print(torch.__version__, torch.version.cuda)"

      - name: Build the PyTorch3D wheel
        env:
          PYTORCH3D_REF: ${{ inputs.pytorch3d_ref }}
        run: |
          set -euxo pipefail
          PY=/opt/python/cp311-cp311/bin/python
          git clone --depth 1 --branch "$PYTORCH3D_REF" \
            https://github.com/facebookresearch/pytorch3d.git /tmp/pytorch3d
          git -C /tmp/pytorch3d rev-parse HEAD
          mkdir -p "$GITHUB_WORKSPACE/dist"
          cd /tmp/pytorch3d
          export CUDA_HOME="${CUDA_HOME_DIR}"
          export TORCH_CUDA_ARCH_LIST="${TORCH_ARCH_LIST}"
          export FORCE_CUDA=1
          export MAX_JOBS=4
          "$PY" -m pip wheel . --no-build-isolation --no-deps -w "$GITHUB_WORKSPACE/dist"
          ls -l "$GITHUB_WORKSPACE/dist"

      - name: Verify architecture coverage in the built artifact
        run: |
          set -euxo pipefail
          PY=/opt/python/cp311-cp311/bin/python
          wheel_path=$(find "$GITHUB_WORKSPACE/dist" -name 'pytorch3d-*.whl' -print -quit)
          test -n "$wheel_path"
          rm -rf /tmp/wheelcheck && mkdir -p /tmp/wheelcheck
          "$PY" -m zipfile -e "$wheel_path" /tmp/wheelcheck
          ext=$(find /tmp/wheelcheck -name '_C*.so' -print -quit)
          test -n "$ext"
          # Read the architectures out of the compiled object rather than
          # trusting the build flags -- task 0042 requires artifact-level proof,
          # because the Windows matrix was once accepted on a flag claim alone.
          "${CUDA_HOME_DIR}/bin/cuobjdump" --list-elf "$ext" | tee /tmp/arches.txt
          for arch in sm_70 sm_75 sm_80 sm_86 sm_90 sm_100 sm_120; do
            grep -q "$arch" /tmp/arches.txt || { echo "missing $arch in built extension"; exit 1; }
          done
          echo "all expected architectures present"

      - name: Checksum the wheel
        run: |
          set -euxo pipefail
          cd "$GITHUB_WORKSPACE/dist"
          for wheel in pytorch3d-*.whl; do
            sha256sum "$wheel" | tee "${wheel}.sha256"
          done

      - name: Upload the wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v5.0.0
        with:
          name: pytorch3d-linux-cu128-wheel
          path: |
            dist/pytorch3d-*.whl
            dist/pytorch3d-*.whl.sha256
          if-no-files-found: error
          retention-days: 14
