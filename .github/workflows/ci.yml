name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dco:
    name: DCO sign-off
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Validate commit sign-offs
        run: uv run python tools/check_dco.py ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }}
      - name: Validate pull request title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: uv run python tools/check_pr_title.py "$PR_TITLE"

  quality:
    name: gates (${{ matrix.os }})
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Install FFmpeg (Linux)
        if: ${{ runner.os == 'Linux' }}
        run: |
          if command -v ffprobe >/dev/null 2>&1; then
            ffprobe -version | head -n 1
            exit 0
          fi
          timeout 300s sudo apt-get \
            -o Acquire::Retries=3 \
            -o DPkg::Lock::Timeout=60 \
            install --yes ffmpeg
      - name: Install FFmpeg (Windows)
        if: ${{ runner.os == 'Windows' }}
        # The Chocolatey community feed has real outages (503s on 2026-07-17
        # broke main): retry, fall back to winget, and fail THIS step loudly
        # if ffprobe still is not runnable — never let the gap surface later
        # as a confusing test assertion.
        run: |
          if (Get-Command ffprobe -ErrorAction SilentlyContinue) {
            ffprobe -version | Select-Object -First 1
            exit 0
          }
          $installed = $false
          foreach ($attempt in 1..3) {
            choco install ffmpeg --no-progress --yes
            if ($LASTEXITCODE -eq 0) { $installed = $true; break }
            if ($attempt -lt 3) {
              Write-Warning "choco install ffmpeg failed (attempt $attempt of 3); retrying in 20s"
              Start-Sleep -Seconds 20
            }
          }
          if (-not $installed) {
            Write-Warning "Chocolatey feed unavailable; falling back to winget"
            foreach ($attempt in 1..2) {
              winget install --id Gyan.FFmpeg --exact --silent --accept-source-agreements --accept-package-agreements --disable-interactivity
              if ($LASTEXITCODE -eq 0) { break }
              if ($attempt -lt 2) { Start-Sleep -Seconds 20 }
            }
            $ffprobe = Get-ChildItem -Path "$env:LOCALAPPDATA\Microsoft\WinGet\Packages" -Recurse -Filter ffprobe.exe -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($ffprobe) { Add-Content -Path $env:GITHUB_PATH -Value $ffprobe.DirectoryName; $env:Path = "$($ffprobe.DirectoryName);$env:Path" }
          }
          if (-not (Get-Command ffprobe -ErrorAction SilentlyContinue)) {
            Write-Error "ffprobe is not runnable after choco retries and the winget fallback"
            exit 1
          }
          ffprobe -version | Select-Object -First 1
      - name: Sync workspace (locked)
        run: uv sync --locked
      - name: Lint
        run: uv run ruff check .
      - name: Format
        run: uv run ruff format --check .
      - name: Documentation links
        run: uv run python tools/check_markdown_links.py
      - name: Types (Windows platform)
        run: uv run pyright --pythonplatform Windows
      - name: Types (Linux platform)
        run: uv run pyright --pythonplatform Linux
      - name: Layer dependency rule (ADR-0001)
        run: uv run lint-imports
      - name: Tests + coverage gate
        run: uv run pytest -q --cov=posecap_core --cov=posecap_contracts --cov-fail-under=90

  licensed-binaries:
    name: licensed-binary scan (PRD metric)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: No licensed model binaries in the tree
        run: git ls-files -z | xargs -0 python tools/check_licensed_binaries.py

  audit:
    name: dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Export locked requirements
        run: uv export --locked --format requirements.txt --no-emit-workspace -o requirements-audit.txt
      - name: pip-audit
        run: uv run pip-audit -r requirements-audit.txt

  workflow-security:
    name: workflow security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Validate workflow syntax
        run: uv run pre-commit run --hook-stage pre-push actionlint --all-files
      - name: Audit workflow security
        run: uv run zizmor .

  package:
    name: package smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Sync workspace
        run: uv sync --locked
      - name: Build workspace wheels
        run: uv build --all-packages --out-dir build/wheels
      - name: Build Blender extension
        run: uv run python tools/build_extension.py --output-dir build/extension --staging-dir build/extension-stage --release
      - name: Create clean smoke environment
        run: uv venv build/smoke-venv --python 3.11
      - name: Install built wheels
        run: uv pip install --python build/smoke-venv --find-links build/wheels posecap-contracts posecap-core posecap-engine
      - name: Import installed packages
        run: uv run --python build/smoke-venv --no-project python -c "import posecap_contracts, posecap_core, posecap_engine"

  required:
    name: CI required
    if: always()
    needs: [quality, licensed-binaries, audit, dco, workflow-security, package]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Require every CI component
        env:
          QUALITY: ${{ needs.quality.result }}
          LICENSED_BINARIES: ${{ needs.licensed-binaries.result }}
          AUDIT: ${{ needs.audit.result }}
          DCO: ${{ needs.dco.result }}
          WORKFLOW_SECURITY: ${{ needs.workflow-security.result }}
          PACKAGE: ${{ needs.package.result }}
        run: |
          test "$QUALITY" = "success"
          test "$LICENSED_BINARIES" = "success"
          test "$AUDIT" = "success"
          test "$DCO" = "success" || test "$DCO" = "skipped"
          test "$WORKFLOW_SECURITY" = "success"
          test "$PACKAGE" = "success"
