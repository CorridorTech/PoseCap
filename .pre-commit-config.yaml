default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=5000]
      - id: detect-private-key
  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12
    hooks:
      - id: actionlint
        stages: [pre-push]
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --force-exclude
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format check
        entry: uv run ruff format --check --force-exclude
        language: system
        types: [python]
      - id: licensed-binaries
        name: block licensed model binaries
        entry: uv run python tools/check_licensed_binaries.py
        language: system
      - id: pyright-windows
        name: pyright (windows platform)
        entry: uv run pyright --pythonplatform Windows
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: pyright-linux
        name: pyright (linux platform)
        entry: uv run pyright --pythonplatform Linux
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: pytest
        name: pytest (default tags)
        entry: uv run pytest -q
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: import-linter
        name: import-linter
        entry: uv run lint-imports
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: dco-signoff
        name: DCO sign-off
        entry: uv run python tools/check_dco.py origin/main HEAD
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: zizmor
        name: GitHub Actions security
        entry: uv run zizmor .
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: markdown-links
        name: repository Markdown links
        entry: uv run python tools/check_markdown_links.py
        language: system
        pass_filenames: false
        stages: [pre-push]
